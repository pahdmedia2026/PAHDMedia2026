<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百年淨空 - 每日影像回顧</title>
    <style>
        /* ================= 基礎重置與全局樣式 ================= */
        :root {
            --primary-color: #4a6b8c; 
            --bg-gradient-start: #e0ecf5; 
            --bg-gradient-end: #ffffff;
            --gold-accent: #c0a16b; 
            --text-dark: #2c3e50;
            --text-light: #667788;
            --font-serif: "Noto Serif TC", "Songti TC", "MingLiU", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            background-attachment: fixed;
            line-height: 1.6;
        }

        .serif-text { font-family: var(--font-serif); }
        .hidden { display: none !important; }

        .page-view {
            animation: fadeIn 0.8s ease-in-out;
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 語言切換區 ================= */
        .lang-switcher {
            position: absolute;
            top: 1rem;
            right: 5%;
            z-index: 100;
        }

        .lang-switcher select {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--gold-accent);
            background: rgba(255, 255, 255, 0.8);
            color: var(--primary-color);
            font-family: var(--font-sans);
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* ================= 首頁樣式 (Home View) ================= */
        .hero-banner {
            width: 100%;
            margin-top: 2rem;
            margin-bottom: 2rem;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .hero-banner img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .main-title {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            font-family: var(--font-serif);
        }

        .sub-title {
            font-size: 1.1rem;
            color: var(--text-light);
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .location-text {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .day-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-accent);
            box-shadow: 0 8px 25px rgba(192, 161, 107, 0.15);
        }

        .day-date {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-family: var(--font-serif);
        }

        .day-desc {
            font-size: 0.95rem;
            color: var(--text-light);
        }

        /* ================= 子頁面樣式 (Detail View) ================= */
        .detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(192, 161, 107, 0.3);
            margin-top: 3rem; 
        }

        .back-btn {
            background: none;
            border: 1px solid var(--gold-accent);
            color: var(--gold-accent);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-serif);
            margin-right: 2rem;
        }

        .back-btn:hover {
            background: var(--gold-accent);
            color: #fff;
        }

        .detail-title {
            font-size: 1.6rem;
            color: var(--primary-color);
        }

        .content-layout {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .video-section {
            flex: 0 0 320px;
            position: sticky;
            top: 2rem;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 9 / 16;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .gallery-section { flex: 1; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background-color: #eaeaea;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img { transform: scale(1.08); }

        /* 當圖片未加載出來時的佔位樣式 (可選) */
        .img-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: #f5f7fa;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        /* ================= 圖片放大預覽 (Lightbox) 樣式 ================= */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        .lightbox.active { display: flex; }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            transition: color 0.3s;
        }

        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        .lightbox-close:hover, .lightbox-prev:hover, .lightbox-next:hover {
            color: var(--gold-accent);
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-family: var(--font-serif);
        }

        @media (max-width: 800px) {
            .content-layout { flex-direction: column; }
            .video-section {
                flex: none; width: 100%; max-width: 400px;
                margin: 0 auto 2rem auto; position: relative; top: 0;
            }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .lightbox-prev, .lightbox-next { font-size: 30px; padding: 10px; }
            .lightbox-close { top: 10px; right: 20px; font-size: 30px; }
        }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <select id="lang-select" onchange="switchLanguage(this.value)">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div id="home-view" class="page-view">
        <div class="hero-banner">
            <img src="https://i.imgur.com/KaHkGU4.jpg" alt="百年淨空 活動海報">
        </div>
        <div class="header-section">
            <h1 class="main-title" data-i18n="mainTitle">百年淨空</h1>
            <p class="sub-title serif-text" data-i18n="subTitle">地球母親 天下母親 世界和平大會</p>
            <p class="location-text" data-i18n="location">法國巴黎 · 聯合國教科文組織總部1號大廳</p>
        </div>
        
        <div class="days-grid">
            <div class="day-card" onclick="openDetail('03/07', 1)">
                <h3 class="day-date">03/07</h3>
                <p class="day-desc" data-i18n="d1Desc">星期六 · 準備和灑淨儀式</p>
            </div>
            <div class="day-card" onclick="openDetail('03/08', 2)">
                <h3 class="day-date">03/08</h3>
                <p class="day-desc" data-i18n="d2Desc">星期日 · 三時繫念法會</p>
            </div>
            <div class="day-card" onclick="openDetail('03/09', 3)">
                <h3 class="day-date">03/09</h3>
                <p class="day-desc" data-i18n="d3Desc">星期一 · 國際和平大會</p>
            </div>
            <div class="day-card" onclick="openDetail('03/10', 4)">
                <h3 class="day-date">03/10</h3>
                <p class="day-desc" data-i18n="d4Desc">星期二 · 國際和平大會</p>
            </div>
        </div>
    </div>

    <div id="detail-view" class="page-view hidden">
        <div class="detail-header">
            <button class="back-btn" onclick="goHome()" data-i18n="backBtn">← 返回日程</button>
            <h2 class="detail-title serif-text" id="detail-title">03/07 精彩回顧</h2>
        </div>

        <div class="content-layout">
            <div class="video-section">
                <div class="video-container">
                    <video id="daily-video" src="" 
                           style="width: 100%; height: 100%; object-fit: cover;" 
                           controls playsinline loop preload="metadata">
                        您的瀏覽器不支援 HTML5 影片播放。
                    </video>
                </div>
            </div>

            <div class="gallery-section">
                <div class="gallery-grid" id="gallery-grid">
                    </div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-prev" onclick="changeImage(-1)">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged Photo">
        <span class="lightbox-next" onclick="changeImage(1)">&#10095;</span>
        <div class="lightbox-caption" id="lightbox-caption">1 / 20</div>
    </div>

    <script>
        // --- 1. 多語言詞典配置 ---
        const translations = {
            zh: {
                mainTitle: "百年淨空",
                subTitle: "地球母親 天下母親 世界和平大會",
                location: "法國巴黎 · 聯合國教科文組織總部1號大廳",
                d1Desc: "星期六 · 準備和灑淨儀式",
                d2Desc: "星期日 · 三時繫念法會",
                d3Desc: "星期一 · 國際和平大會",
                d4Desc: "星期二 · 國際和平大會",
                backBtn: "← 返回日程",
                highlightSuffix: " 精彩回顧"
            },
            en: {
                mainTitle: "Centenary of Master Chin Kung",
                subTitle: "Mother Earth Mother of All International Peace Conference",
                location: "Hall 1, UNESCO Headquarters, Paris, France",
                d1Desc: "Sat · Preparation & Purifying Ritual",
                d2Desc: "Sun · Thrice Yearning Chanting Service",
                d3Desc: "Mon · Int'l Peace Conference",
                d4Desc: "Tue · Int'l Peace Conference",
                backBtn: "← Back",
                highlightSuffix: " Highlights"
            },
            fr: {
                mainTitle: "Centenaire du Maître Chin Kung",
                subTitle: "Conférence Internationale pour la Paix",
                location: "Salle 1, Siège de l'UNESCO, Paris, France",
                d1Desc: "Sam · Préparation & Rituel de Purification",
                d2Desc: "Dim · Cérémonie de Chant",
                d3Desc: "Lun · Conférence Int. pour la Paix",
                d4Desc: "Mar · Conférence Int. pour la Paix",
                backBtn: "← Retour",
                highlightSuffix: " Temps Forts"
            }
        };

        let currentLang = 'zh';
        let currentDateId = '';
        let currentDayIndex = 1; // 記錄當前是第幾天 (1-4)
        let currentImageIndex = 0;   
        let currentImagesArray = []; // 動態存儲當前頁面的 20 張圖片路徑

        // --- 2. 語言切換邏輯 ---
        function switchLanguage(lang) {
            currentLang = lang;
            const dict = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.innerHTML = dict[key]; 
                }
            });
            if (!document.getElementById('detail-view').classList.contains('hidden') && currentDateId) {
                updateDetailTitle();
            }
        }

        // --- 3. 頁面導航與動態路徑生成 ---
        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const detailTitle = document.getElementById('detail-title');
        const galleryGrid = document.getElementById('gallery-grid');
        const videoElement = document.getElementById('daily-video');

        function updateDetailTitle() {
            detailTitle.innerText = `${currentDateId}${translations[currentLang].highlightSuffix}`;
        }

        function openDetail(dateId, dayIndex) {
            currentDateId = dateId;
            currentDayIndex = dayIndex;
            updateDetailTitle();
            
            // 1. 動態加載影片
            videoElement.src = `video/day-${dayIndex}/video.mp4`;
            videoElement.load(); // 強制重新加載新路徑的影片

            // 2. 動態生成 20 張圖片網格
            galleryGrid.innerHTML = ''; 
            currentImagesArray = []; // 清空之前的陣列
            
            for (let i = 1; i <= 20; i++) {
                // 生成圖片的本地相對路徑
                const imgPath = `photo/day-${dayIndex}/${i}.jpg`;
                currentImagesArray.push(imgPath);
                
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                // 加入了 onerror 處理：如果某一天圖片還沒傳滿 20 張，會顯示一個灰色佔位框而不是破圖圖標
                item.innerHTML = `
                    <img src="${imgPath}" alt="Photo ${i}" loading="lazy" 
                         onclick="openLightbox(${i - 1})" 
                         onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>照片上傳中...</div>';">
                `;
                galleryGrid.appendChild(item);
            }

            homeView.classList.add('hidden');
            detailView.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function goHome() {
            detailView.classList.add('hidden');
            homeView.classList.remove('hidden');
            currentDateId = '';
            
            // 停止影片播放
            if (videoElement && !videoElement.paused) {
                videoElement.pause();
                videoElement.currentTime = 0; 
            }
        }

        // --- 4. Lightbox 圖片預覽邏輯 ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        function openLightbox(index) {
            // 如果點擊的是佔位符(沒有加載出圖片)，就不打開大圖
            if(!currentImagesArray[index]) return; 

            currentImageIndex = index;
            updateLightboxView();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; 
        }

        function changeImage(step) {
            currentImageIndex += step;
            if (currentImageIndex < 0) {
                currentImageIndex = currentImagesArray.length - 1;
            } else if (currentImageIndex >= currentImagesArray.length) {
                currentImageIndex = 0;
            }
            updateLightboxView();
        }

        function updateLightboxView() {
            lightboxImg.src = currentImagesArray[currentImageIndex];
            lightboxCaption.innerText = `${currentImageIndex + 1} / ${currentImagesArray.length}`;
            
            // 處理大圖也可能不存在的情況
            lightboxImg.onerror = function() {
                this.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600'><rect width='100%' height='100%' fill='%23eee'/><text x='50%' y='50%' font-family='Arial' font-size='24' fill='%23999' text-anchor='middle' dy='.3em'>照片上傳中...</text></svg>";
            };
        }

        // --- 5. 鍵盤快捷鍵支持 ---
        document.addEventListener('keydown', function(event) {
            if (lightbox.classList.contains('active')) {
                if (event.key === 'Escape') {
                    closeLightbox();
                } else if (event.key === 'ArrowLeft') {
                    changeImage(-1);
                } else if (event.key === 'ArrowRight') {
                    changeImage(1);
                }
            }
        });
    </script>
</body>
</html>
